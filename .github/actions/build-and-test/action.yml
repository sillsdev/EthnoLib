name: Build and test
description: Build the publishable UI packages and run Nx unit + e2e targets in parallel.
runs:
  using: composite
  steps:
    - name: Build UI packages
      run: npx nx run-many --target=build --projects=@ethnolib/state-management-react,@ethnolib/language-chooser-react-mui,@ethnolib/language-chooser-svelte-daisyui
      shell: bash

    - name: Run unit and e2e tests in parallel
      run: CI=true npx nx run-many --all --targets=test,e2e --parallel=10
      shell: bash
