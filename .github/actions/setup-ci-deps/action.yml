name: Setup CI dependencies
description: Setup Node.js with npm cache, install dependencies, and optionally install Playwright Chromium with cache.
inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22"
  registry-url:
    description: npm registry URL.
    required: false
    default: "https://registry.npmjs.org/"
  install-playwright:
    description: Whether to cache and install Playwright Chromium.
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json
        registry-url: ${{ inputs.registry-url }}

    # Pin npm so the lockfile is generated/validated by the same version everywhere
    # (local Volta pin, CI install, and release publish). Mismatched npm versions
    # rewrite package-lock.json differently and cause `npm ci` <-> `npm i` thrash.
    # The version is read from the Volta pin in package.json so CI and local dev
    # share a single source of truth and cannot drift apart.
    - name: Pin npm version
      run: npm install -g npm@$(node -p "require('./package.json').volta.npm")
      shell: bash

    - name: Install dependencies
      run: npm ci --no-audit
      shell: bash

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/AppData/Local/ms-playwright
          ~/Library/Caches/ms-playwright
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('node_modules/playwright-core/package.json') }}

    - name: Install playwright browsers for e2e tests
      if: inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium
      shell: bash
